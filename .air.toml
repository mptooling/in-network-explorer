root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/explorer ./cmd/in-network-explorer"
  bin = "./tmp/explorer scrape"
  include_ext = ["go", "json"]
  exclude_dir = ["tmp", "vendor", ".git", "docs", "scripts"]
  exclude_regex = ["_test\\.go$"]
  delay = 1000

[log]
  time = false

[misc]
  clean_on_exit = true
