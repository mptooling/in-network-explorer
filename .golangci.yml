version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - godot
    - misspell
    - noctx
  exclusions:
    rules:
      - path: "_test\\.go"
        linters: [errcheck]

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/pavlomaksymov/in-network-explorer
