linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - godot
    - misspell
    - noctx

linters-settings:
  goimports:
    local-prefixes: github.com/pavlomaksymov/in-network-explorer

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters: [errcheck]
