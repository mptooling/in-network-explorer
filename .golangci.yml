version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - godot
    - misspell
    - noctx

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes: github.com/pavlomaksymov/in-network-explorer

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters: [errcheck]
